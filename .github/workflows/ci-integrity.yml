name: CI Integrity

# Trust anchor on main: required guard scripts must remain wired in cloud CI.
# Catches tampered workflow files even if someone bypasses local hooks.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/validate_contributor_scope.py"
      - "scripts/validate_report.py"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/validate_contributor_scope.py"
      - "scripts/validate_report.py"

jobs:
  verify-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify CI workflow integrity
        run: python3 scripts/validate_contributor_scope.py --verify-workflows

      - name: Smoke-test guard scripts import
        run: |
          python3 scripts/validate_contributor_scope.py --help
          python3 scripts/validate_report.py --help
