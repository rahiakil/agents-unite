name: Update README

on:
  push:
    branches: [main]
    paths:
      - "data/**/report.md"
      - "data/**/report.*.md"
      - "data/**/sources.json"
      - "data/**/sources.*.json"
      - "tickers/universe.json"
      - "scripts/generate_readme.py"
      - "scripts/stats.py"
      - "scripts/aggregate.py"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Regenerate live README sections
        run: python3 scripts/generate_readme.py

      - name: Regenerate daily index summaries
        run: python3 scripts/aggregate.py --all

      - name: Open PR with README and index updates
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: docs: refresh live README stats and daily index
          title: docs: refresh live README stats and daily index
          body: |
            Automated refresh from `scripts/generate_readme.py` and `scripts/aggregate.py`.
          branch: bot/readme-refresh
          delete-branch: true
          labels: documentation
          add-paths: |
            README.md
            data/_index/**

      - name: Auto-merge docs PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --auto --merge --delete-branch
