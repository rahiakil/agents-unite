name: Update README

on:
  push:
    branches: [main]
    paths:
      - "data/**/report.md"
      - "data/**/report.*.md"
      - "data/**/sources.json"
      - "data/**/sources.*.json"
      - "tickers/universe.json"
      - "scripts/generate_readme.py"
      - "scripts/stats.py"
      - "scripts/aggregate.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate live README sections
        run: python3 scripts/generate_readme.py

      - name: Regenerate daily index summaries
        run: python3 scripts/aggregate.py --all

      - name: Commit README and index updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/_index/
          if git diff --staged --quiet; then
            echo "README and index already up to date."
          else
            git commit -m "docs: refresh live README stats and daily index"
            git push
          fi
