name: Validate Report

on:
  pull_request:
    paths:
      - "data/**"
      - "scripts/validate_report.py"
      - "scripts/au_common.py"
      - "tickers/universe.json"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/validate_report.py"
      - "scripts/au_common.py"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect report directories
        id: changed
        run: |
          set -euo pipefail
          REPORT_GLOBS=(
            'data/*/*/report.md'
            'data/*/*/report.*.md'
            'data/*/*/sources.json'
            'data/*/*/sources.*.json'
            'data/*/*/consensus.md'
          )

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- "${REPORT_GLOBS[@]}" || true)
          else
            CHANGED=$(git ls-files "${REPORT_GLOBS[@]}" || true)
          fi

          PATHS=$(
            echo "$CHANGED" | while IFS= read -r file; do
              [ -n "$file" ] || continue
              case "$file" in
                data/_index/*) continue ;;
              esac
              dirname "$file"
            done | sort -u
          )

          if [ -z "$PATHS" ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
            {
              echo "paths<<EOF"
              echo "$PATHS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Validate reports
        if: steps.changed.outputs.has_reports == 'true'
        run: |
          set -euo pipefail
          failed=0
          while IFS= read -r dir; do
            [ -n "$dir" ] || continue
            echo "Validating $dir"
            python3 scripts/validate_report.py "$dir" || failed=1
          done <<< "${{ steps.changed.outputs.paths }}"
          exit "$failed"

      - name: No report changes
        if: steps.changed.outputs.has_reports != 'true'
        run: echo "No report directories to validate."
