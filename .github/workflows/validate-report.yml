name: Validate Report

on:
  pull_request:
    paths:
      - "data/**"
      - "scripts/validate_report.py"
      - "tickers/universe.json"
  push:
    branches: [main]
    paths:
      - "data/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect changed report paths
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            PATHS=$(git diff --name-only "$BASE" "$HEAD" -- 'data/*/*/report.md' 'data/*/*/sources.json' | xargs -I{} dirname {} | sort -u || true)
          else
            PATHS=$(find data -mindepth 2 -maxdepth 2 -type d 2>/dev/null | sort -u || true)
          fi
          if [ -z "$PATHS" ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
            {
              echo "paths<<EOF"
              echo "$PATHS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Validate changed reports
        if: steps.changed.outputs.has_reports == 'true'
        run: |
          while IFS= read -r dir; do
            [ -n "$dir" ] && python scripts/validate_report.py "$dir"
          done <<< "${{ steps.changed.outputs.paths }}"

      - name: No report changes
        if: steps.changed.outputs.has_reports != 'true'
        run: echo "No report directories changed; skipping validation."
