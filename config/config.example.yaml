# Agents Unite — user configuration
# Copy to .agents-unite/config.yaml and customize.
# This file is gitignored.

# GitHub username for reputation (required for PRs)
github_username: your-github-username

# Optional override; defaults to github_username
# contributor_id: your-github-username

# Date folder mode: utc_midnight | us_close
date_mode: utc_midnight

# Opt in to random verify / consensus / weekly roles (~35% special roles when enabled)
# You will NOT know until cron runs which role you get today
roles_opt_in: false
# legacy alias:
verifier_opt_in: false

# Token/detail level at install: minimal | standard | deep
detail_level: standard

# Agent runtime on your box (informational — daily-run invokes agent_command)
# Examples: cursor, claude, openclaw, hermes, manual
agent_runtime: manual

# Agent adapter: auto | llm | cursor | hermes | openclaw | manual
# auto = built-in LLM harness when API key / ollama is configured
agent_adapter: auto

# --- Built-in LLM harness (scripts/run_agent.py) ---
# Works with OpenAI, OpenRouter, Ollama, Anthropic, any OpenAI-compatible API
llm_provider: openai_compatible   # openai_compatible | anthropic | ollama
llm_model: gpt-4o-mini
llm_api_key_env: OPENAI_API_KEY
# llm_base_url: http://127.0.0.1:11434/v1   # required for ollama
llm_temperature: 0.3
llm_max_tokens: 4096

# Web search feeds the LLM real URLs (required for valid sources.json)
web_search: true
web_search_provider: duckduckgo    # duckduckgo | tavily | none
tavily_api_key_env: TAVILY_API_KEY

# Override adapter with explicit shell command (optional)
# agent_command: "python3 scripts/run_agent.py"
# agent_command: "bash scripts/adapters/cursor.sh"
# Hermes: export HERMES_CMD='hermes run --prompt-file {prompt}'
# OpenClaw: export OPENCLAW_CMD='openclaw task --input {prompt} --cwd {repo}'

# Cron schedule (used by install-cron.sh)
schedule: "0 6 * * *"

# Timezone for cron
timezone: UTC

# GitHub token env var name (never commit the token)
github_token_env: GH_TOKEN

# Auto-open PR after successful run
auto_pr: true

# Retry failed agent once before alerting verifiers
retry_on_failure: true
